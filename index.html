<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b81">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script type="module" src="firebase.js"></script>
<title>Long Distance Relationship Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

:root {
  --rose: #e8526a;
  --rose-light: #f07080;
  --rose-pale: #fdf2f4;
  --rose-hover: #fde0e5;
  --rose-mid: #f5c0ca;
  --green: #4a9e6f;
  --amber: #e8a040;
  --text: #2e1820;
  --text-muted: #a0788a;
  --white: #ffffff;
  --shadow: 0 6px 28px rgba(232,82,106,0.10);
  --shadow-lg: 0 12px 48px rgba(232,82,106,0.15);
  --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Jost', sans-serif;
  background: var(--rose-pale);
  background-image:
    radial-gradient(ellipse 60% 40% at 10% 15%, rgba(255,180,200,0.35) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 90% 85%, rgba(255,160,185,0.25) 0%, transparent 60%);
  min-height: 100vh;
  color: var(--text);
  padding: 32px 16px 80px;
}

/* ---- TYPOGRAPHY ---- */
h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.4rem;
  font-weight: 600;
  color: var(--rose);
  letter-spacing: -0.5px;
  line-height: 1.1;
}

h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem;
  color: var(--text);
}

.subtitle {
  font-size: 0.82rem;
  color: var(--text-muted);
  font-weight: 300;
  letter-spacing: 0.5px;
  margin-bottom: 32px;
  margin-top: 3px;
}

/* ---- LAYOUT ---- */
header {
  text-align: center;
  margin-bottom: 28px;
}

.card {
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(10px);
  border-radius: var(--radius);
  padding: 26px;
  box-shadow: var(--shadow);
  max-width: 680px;
  margin: 0 auto 20px;
  border: 1px solid rgba(255,200,210,0.4);
}

/* ---- NAVIGATION HUB ---- */
.nav-hub {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  max-width: 680px;
  margin: 0 auto 20px;
}

.nav-card {
  background: rgba(255,255,255,0.92);
  border-radius: var(--radius);
  padding: 20px 14px;
  text-align: center;
  cursor: pointer;
  border: 1.5px solid rgba(255,200,210,0.4);
  box-shadow: var(--shadow);
  transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.nav-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
  border-color: var(--rose-mid);
}

.nav-icon {
  font-size: 1.8rem;
}

.nav-label {
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--text-muted);
}

/* ---- LABELS ---- */
.section-label {
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.8px;
  color: var(--text-muted);
  margin-bottom: 12px;
}

/* ---- BUTTONS ---- */
.user-buttons {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 16px;
}

button {
  padding: 10px 22px;
  border: none;
  border-radius: 10px;
  background: var(--rose-light);
  color: white;
  cursor: pointer;
  font-family: 'Jost', sans-serif;
  font-size: 0.88rem;
  font-weight: 500;
  transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
  box-shadow: 0 2px 10px rgba(232,82,106,0.2);
  letter-spacing: 0.3px;
}

button:hover {
  background: var(--rose);
  transform: translateY(-1px);
  box-shadow: 0 5px 16px rgba(232,82,106,0.3);
}

button:active { transform: translateY(0); }

button.selected {
  background: var(--green) !important;
  box-shadow: 0 2px 10px rgba(74,158,111,0.3);
}

.enter-btn {
  background: linear-gradient(135deg, var(--rose-light), var(--rose));
  padding: 11px 34px;
  font-size: 0.96rem;
  font-weight: 600;
  box-shadow: 0 5px 20px rgba(232,82,106,0.28);
}

/* ---- INPUTS ---- */
.inputs-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 14px;
}

input[type="text"], input:not([type]) {
  padding: 10px 16px;
  border: 1.5px solid #f0d0d8;
  border-radius: 10px;
  font-family: 'Jost', sans-serif;
  font-size: 0.9rem;
  color: var(--text);
  background: #fff8f9;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  flex: 1;
  min-width: 130px;
}

input:focus { border-color: var(--rose-light); box-shadow: 0 0 0 3px rgba(232,82,106,0.08); }

/* ---- SCORE ---- */
#scoreDisplay {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6rem;
  font-weight: 600;
  color: var(--rose);
  text-align: center;
  min-height: 36px;
}

/* ---- CALENDAR ---- */
#monthTitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 14px;
  letter-spacing: 0.5px;
}

.month-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 14px;
}

.month-nav button {
  padding: 5px 14px;
  font-size: 0.8rem;
  background: var(--rose-pale);
  color: var(--rose);
  border: 1.5px solid var(--rose-mid);
}

.month-nav button:hover {
  background: var(--rose-hover);
}

#calendarHeader {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  max-width: 640px;
  margin: 0 auto 5px;
  text-align: center;
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
}

#calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  max-width: 640px;
  margin: 0 auto;
}

.day {
  background: #fff8f9;
  border: 1.5px solid #f5e0e5;
  border-radius: 10px;
  min-height: 72px;
  padding: 6px;
  cursor: pointer;
  position: relative;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  overflow: hidden;
}

.day:hover {
  background: var(--rose-hover);
  border-color: var(--rose-light);
  transform: scale(1.03);
}

.day.selected {
  border-color: var(--rose);
  background: #ffe0e8;
  box-shadow: 0 0 0 2px rgba(232,82,106,0.2);
}

.day.today .dayNumber {
  color: var(--rose);
  font-weight: 700;
}

.dayNumber {
  font-weight: 600;
  font-size: 0.8rem;
  color: var(--text);
}

.activityDot {
  width: 6px;
  height: 6px;
  background: var(--rose);
  border-radius: 50%;
  position: absolute;
  bottom: 7px;
  left: 7px;
}

.checkMark {
  position: absolute;
  bottom: 4px;
  right: 6px;
  font-size: 12px;
}

.activity-name {
  font-size: 0.58rem;
  color: var(--text-muted);
  margin-top: 3px;
  line-height: 1.2;
  overflow: hidden;
  max-height: 28px;
  word-break: break-word;
}

/* ---- ACTION ROW ---- */
.action-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
}

.action-row input { flex: 2; min-width: 180px; }

.checkin-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

#attendBtn { background: linear-gradient(135deg, #4caf50, #388e3c); }
#attendBtn:hover { background: linear-gradient(135deg, #43a047, #2e7d32); }
#missBtn { background: linear-gradient(135deg, #ff7043, #e64a19); }
#missBtn:hover { background: linear-gradient(135deg, #f4511e, #bf360c); }

/* ---- REWARD BOX ---- */
#rewardBox {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  color: var(--rose);
  text-align: center;
  min-height: 30px;
  padding: 8px;
  border-radius: 10px;
  transition: all 0.4s;
}

#rewardBox.active {
  background: linear-gradient(135deg, #fff0f3, #ffe0ea);
  border: 1.5px solid #ffb3c4;
  animation: pop 0.4s ease;
}

@keyframes pop {
  0% { transform: scale(0.95); opacity: 0.6; }
  60% { transform: scale(1.04); }
  100% { transform: scale(1); opacity: 1; }
}

/* ---- DIVIDER ---- */
.divider {
  height: 1px;
  background: linear-gradient(to right, transparent, #f0d0d8, transparent);
  margin: 4px 0 16px;
}

/* ---- STATUS BADGE ---- */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.badge-online { background: rgba(74,158,111,0.15); color: var(--green); }

/* ---- RESPONSIVE ---- */
@media (max-width: 520px) {
  .nav-hub { grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .nav-card { padding: 16px 8px; }
  .nav-icon { font-size: 1.5rem; }
  .nav-label { font-size: 0.7rem; }
  h1 { font-size: 1.9rem; }
  .day { min-height: 58px; }
}

</style>
</head>
<body>

<header>
  <h1>💌 Long Distance</h1>
  <p class="subtitle">Stay close, no matter the miles</p>
</header>

<!-- Setup Card -->
<div class="card" id="setupCard">
  <div class="section-label">Welcome 💌</div>
  <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:18px; text-align:center;">
    Enter your name and a shared couple code.<br>
    Your partner uses the same code on their device.
  </p>

  <div class="inputs-row">
    <input id="myName" placeholder="Your name" autocomplete="off">
  </div>
  <div class="inputs-row">
    <input id="coupleCode" placeholder="Couple code (e.g. sunflower42)" autocomplete="off">
  </div>

  <div id="setupError" style="color:var(--rose); font-size:0.82rem; text-align:center; min-height:20px; margin-bottom:8px;"></div>

  <div style="text-align:center;">
    <button class="enter-btn" onclick="enterApp()">Let's Go ✨</button>
  </div>
</div>

<!-- Hidden inputs needed for score display -->
<input id="nameA" type="hidden">
<input id="nameB" type="hidden">

<!-- Main App -->
<div id="mainApp" style="display:none;">

  <!-- Score Card -->
  <div class="card">
    <h2 id="scoreDisplay"></h2>
    <div style="text-align:center; margin-top:6px;" id="onlineBadge"></div>
  </div>

  <!-- Switch account -->
  <div style="text-align:center; margin-top:10px;">
    <button onclick="switchAccount()" style="background:none; border:1.5px solid var(--rose-mid); color:var(--text-muted); font-size:0.75rem; padding:6px 16px;">
    Switch Account
    </button>
  </div>

  <!-- Navigation Hub -->
  <div class="nav-hub">
    <div class="nav-card" onclick="showSection('calendar')">
      <div class="nav-icon">📅</div>
      <div class="nav-label">Calendar</div>
    </div>
    <a class="nav-card" href="./hangout.html" onclick="passSession()">
      <div class="nav-icon">🫶</div>
      <div class="nav-label">Hang Out</div>
    </a>
    <a class="nav-card" href="./workout.html" onclick="passSession()">
      <div class="nav-icon">🏋️</div>
      <div class="nav-label">Workout</div>
    </a>
  </div>

  <!-- Calendar Section -->
  <div id="calendarSection" class="card">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹ Prev</button>
      <h3 id="monthTitle"></h3>
      <button onclick="changeMonth(1)">Next ›</button>
    </div>

    <div id="calendarHeader">
      <div>Sun</div><div>Mon</div><div>Tue</div>
      <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>
    <div id="calendar"></div>

    <div class="divider" style="margin-top:18px;"></div>

    <div class="section-label" style="margin-top:4px;">Add Activity to Selected Day</div>
    <div class="action-row">
      <input id="activityInput" placeholder="Activity name..." type="text">
      <button onclick="addActivity()">Add</button>
      <button onclick="generateActivity()">💡 Idea</button>
    </div>

    <div class="divider" style="margin-top:16px;"></div>

    <div class="section-label">Check-in for Selected Day</div>
    <div class="checkin-row">
      <button id="attendBtn" onclick="checkIn(true)">✔ I Attended</button>
      <button id="missBtn" onclick="checkIn(false)">✖ I Missed</button>
    </div>

    <div style="margin-top:14px;">
      <div id="rewardBox"></div>
    </div>
  </div>

</div>

<script>

let user = ""
let couple = ""
let selectedDate = null
let selectedDayEl = null
let calendarYear, calendarMonth

let scoreA = 0
let scoreB = 0
let activities = {}

const activityIdeas = [
  "Watch a movie together","Cook the same meal","Online game night",
  "Deep conversation night","Future travel planning","Relationship quiz",
  "Workout together","Virtual coffee date","Send voice notes","Photo sharing night",
  "Read the same book","Draw each other","Trivia night","Stargazing call",
  "Build a playlist together","Virtual museum tour"
]

const rewards = [
  "Plan a surprise date 🌹","Send a handwritten letter 💌",
  "Order food for your partner 🍕","Make a love playlist 🎵",
  "Write 5 things you love about them ❤️"
]

const challenges = [
  "Write a heartfelt love paragraph 📝","Plan the next date night 🌙",
  "Send a surprise gift 🎁","Record a heartfelt voice note 🎙️",
  "Share your favourite memory together 🌟"
]

/* ---------- session ---------- */

function saveSession() {
  localStorage.setItem("rdTracker_lastSession", JSON.stringify({
    nameA: document.getElementById("nameA").value,
    nameB: document.getElementById("nameB").value,
    coupleCode: couple,
    user
  }))
}

function passSession() {
  saveSession()
}

/* ---------- storage ---------- */

function saveLocal() {
  localStorage.setItem("rdTracker_" + couple, JSON.stringify({
    scoreA, scoreB, activities,
    nameA: document.getElementById("nameA").value,
    nameB: document.getElementById("nameB").value
  }))
  saveSession()
}

function loadLocal() {
  let data = localStorage.getItem("rdTracker_" + couple)
  if (data) {
    let p = JSON.parse(data)
    scoreA = p.scoreA || 0
    scoreB = p.scoreB || 0
    activities = p.activities || {}
    if (user === "A" && p.nameB) document.getElementById("nameB").value = p.nameB
    if (user === "B" && p.nameA) document.getElementById("nameA").value = p.nameA
  }
}

/* ---------- Firebase ---------- */

async function saveFirebase() {
  if (!window.db) return
  try {
    await window.setDoc(window.doc(window.db, "couples", couple), { scoreA, scoreB, activities })
  } catch(e) { console.warn("Firebase save failed", e) }
}

function listenFirebase() {
  if (!window.db) return
  try {
    window.onSnapshot(window.doc(window.db, "couples", couple), (snap) => {
      let data = snap.data()
      if (!data) return
      scoreA = data.scoreA ?? scoreA
      scoreB = data.scoreB ?? scoreB
      activities = data.activities ?? activities
      updateScoreDisplay()
      loadCalendar()
    })
  } catch(e) { console.warn("Firebase listen failed", e) }
}

/* ---------- core ---------- */

function setUser(u) {
  user = u
  document.getElementById("btnA").classList.remove("selected")
  document.getElementById("btnB").classList.remove("selected")
  document.getElementById("btn" + u).classList.add("selected")
  document.getElementById("nameStep").style.display = "block"
  document.getElementById("myName").placeholder = "Your name (" + (u === "A" ? "Person A" : "Person B") + ")"
  document.getElementById("myName").focus()
}

async function enterApp() {
  let myName = document.getElementById("myName").value.trim()
  let code = document.getElementById("coupleCode").value.trim()
  let errBox = document.getElementById("setupError")
  errBox.innerText = ""

  if (!myName) { errBox.innerText = "Please enter your name."; return }
  if (!code) { errBox.innerText = "Please enter a couple code."; return }

  couple = code
  document.getElementById("enter-btn") // disable to prevent double tap
  document.querySelector(".enter-btn").disabled = true
  document.querySelector(".enter-btn").innerText = "Connecting..."

  try {
    // Check Firestore for existing couple doc
    let snap = await window.getDoc(window.doc(window.db, "couples", couple))
    let data = snap.exists() ? snap.data() : {}

    if (!data.nameA) {
      // First person to join — become Person A
      user = "A"
      await window.setDoc(window.doc(window.db, "couples", couple), {
        nameA: myName,
        scoreA: 0, scoreB: 0, activities: {}
      }, { merge: true })

    } else if (data.nameA === myName) {
      // Returning Person A
      user = "A"

    } else if (!data.nameB) {
      // Second person to join — become Person B
      user = "B"
      await window.updateDoc(window.doc(window.db, "couples", couple), {
        nameB: myName
      })

    } else if (data.nameB === myName) {
      // Returning Person B
      user = "B"

    } else {
      // Couple is full and name doesn't match either
      errBox.innerText = `This couple code is taken by ${data.nameA} & ${data.nameB}. Try a different code.`
      document.querySelector(".enter-btn").disabled = false
      document.querySelector(".enter-btn").innerText = "Let's Go ✨"
      return
    }

    // Set names in hidden fields from Firestore data
    let resolvedNameA = user === "A" ? myName : (data.nameA || "Person A")
    let resolvedNameB = user === "B" ? myName : (data.nameB || "Person B")
    document.getElementById("nameA").value = resolvedNameA
    document.getElementById("nameB").value = resolvedNameB

    // Load scores and activities
    scoreA = data.scoreA || 0
    scoreB = data.scoreB || 0
    activities = data.activities || {}

    // Save session locally for fast re-login
    localStorage.setItem("rdTracker_lastSession", JSON.stringify({
      user, couple,
      nameA: resolvedNameA,
      nameB: resolvedNameB
    }))

    document.getElementById("setupCard").style.display = "none"
    document.getElementById("mainApp").style.display = "block"

    let now = new Date()
    calendarYear = now.getFullYear()
    calendarMonth = now.getMonth()

    updateScoreDisplay()
    loadCalendar()
    listenFirebase()

  } catch(e) {
    console.error(e)
    errBox.innerText = "Connection failed. Check your internet and try again."
    document.querySelector(".enter-btn").disabled = false
    document.querySelector(".enter-btn").innerText = "Let's Go ✨"
  }
}

function showSection(sec) {
  document.getElementById("calendarSection").style.display = sec === "calendar" ? "block" : "none"
}

function updateScoreDisplay() {
  let nameA = document.getElementById("nameA").value || "Person A"
  let nameB = document.getElementById("nameB").value || "Person B"
  document.getElementById("scoreDisplay").innerText =
    nameA + ": " + scoreA + "  ·  " + nameB + ": " + scoreB
}

function changeMonth(dir) {
  calendarMonth += dir
  if (calendarMonth > 11) { calendarMonth = 0; calendarYear++ }
  if (calendarMonth < 0) { calendarMonth = 11; calendarYear-- }
  selectedDate = null
  selectedDayEl = null
  loadCalendar()
}

function loadCalendar() {
  let calendar = document.getElementById("calendar")
  calendar.innerHTML = ""

  let now = new Date()
  let firstDay = new Date(calendarYear, calendarMonth, 1).getDay()
  let daysInMonth = new Date(calendarYear, calendarMonth + 1, 0).getDate()

  let monthName = new Date(calendarYear, calendarMonth, 1)
    .toLocaleString("default", { month: "long" })
  document.getElementById("monthTitle").innerText = monthName + " " + calendarYear

  for (let i = 0; i < firstDay; i++) {
    calendar.appendChild(document.createElement("div"))
  }

  for (let day = 1; day <= daysInMonth; day++) {
    let div = document.createElement("div")
    div.className = "day"

    // Highlight today
    if (now.getFullYear() === calendarYear && now.getMonth() === calendarMonth && now.getDate() === day) {
      div.classList.add("today")
    }

    div.innerHTML = `<div class="dayNumber">${day}</div>`

    let key = calendarYear + "-" + calendarMonth + "-" + day
    let act = activities[key] || activities[day] // support legacy day-only keys

    if (act) {
      let dot = document.createElement("div")
      dot.className = "activityDot"
      div.appendChild(dot)
      let label = document.createElement("div")
      label.className = "activity-name"
      label.innerText = act.name || act
      div.appendChild(label)
      if (act.checkA !== undefined || act.checkB !== undefined) {
        let mark = document.createElement("div")
        mark.className = "checkMark"
        mark.innerText = (user === "A")
          ? (act.checkA === true ? "✔" : act.checkA === false ? "✖" : "")
          : (act.checkB === true ? "✔" : act.checkB === false ? "✖" : "")
        div.appendChild(mark)
      }
    }

    div.onclick = () => selectDate(day, div)
    calendar.appendChild(div)
  }

  // Restore selection
  if (selectedDate) {
    document.querySelectorAll(".day").forEach(d => {
      let dn = d.querySelector(".dayNumber")
      if (dn && parseInt(dn.innerText) === selectedDate) {
        selectedDayEl = d
        d.classList.add("selected")
      }
    })
  }
}

function selectDate(day, el) {
  selectedDate = day
  if (selectedDayEl) selectedDayEl.classList.remove("selected")
  selectedDayEl = el
  el.classList.add("selected")
}

function getKey(day) {
  return calendarYear + "-" + calendarMonth + "-" + day
}

function addActivity() {
  if (!selectedDate) { alert("Select a date first"); return }
  let name = document.getElementById("activityInput").value.trim()
  if (!name) { alert("Enter an activity name"); return }
  let key = getKey(selectedDate)
  if (!activities[key]) activities[key] = {}
  if (typeof activities[key] === "string") {
    activities[key] = { name: activities[key] }
  }
  activities[key].name = name
  document.getElementById("activityInput").value = ""
  saveLocal()
  saveFirebase()
  loadCalendar()
}

function generateActivity() {
  let idea = activityIdeas[Math.floor(Math.random() * activityIdeas.length)]
  document.getElementById("activityInput").value = idea
}

function checkIn(attended) {
  if (!user) { alert("Select Person A or B first"); return }
  if (!selectedDate) { alert("Select a date on the calendar first"); return }

  document.getElementById("attendBtn").classList.remove("selected")
  document.getElementById("missBtn").classList.remove("selected")
  if (attended) document.getElementById("attendBtn").classList.add("selected")
  else document.getElementById("missBtn").classList.add("selected")

  let key = getKey(selectedDate)
  if (!activities[key] || typeof activities[key] === "string") {
    activities[key] = { name: activities[key] || "" }
  }

  let prevCheck = user === "A" ? activities[key].checkA : activities[key].checkB
  let hadPrev = prevCheck !== undefined

  if (user === "A") activities[key].checkA = attended
  else activities[key].checkB = attended

  if (user === "A") {
    if (hadPrev) scoreA -= prevCheck ? 1 : -1
    scoreA += attended ? 1 : -1
  } else {
    if (hadPrev) scoreB -= prevCheck ? 1 : -1
    scoreB += attended ? 1 : -1
  }

  saveLocal()
  saveFirebase()
  loadCalendar()
  updateScoreDisplay()
  checkRewards()
}

function checkRewards() {
  let box = document.getElementById("rewardBox")
  let msg = ""
  let nameA = document.getElementById("nameA").value || "Person A"
  let nameB = document.getElementById("nameB").value || "Person B"

  if (scoreA >= 10) {
    msg = "🎉 " + nameA + " earned a reward: " + rewards[Math.floor(Math.random() * rewards.length)]
    scoreA = 0
  } else if (scoreB >= 10) {
    msg = "🎉 " + nameB + " earned a reward: " + rewards[Math.floor(Math.random() * rewards.length)]
    scoreB = 0
  } else if (scoreA <= -5) {
    msg = "💪 Challenge for " + nameA + ": " + challenges[Math.floor(Math.random() * challenges.length)]
    scoreA = 0
  } else if (scoreB <= -5) {
    msg = "💪 Challenge for " + nameB + ": " + challenges[Math.floor(Math.random() * challenges.length)]
    scoreB = 0
  }

  if (msg) {
    box.innerText = msg
    box.classList.add("active")
    saveLocal()
    updateScoreDisplay()
  } else {
    box.classList.remove("active")
    box.innerText = ""
  }
}

/* ---------- init ---------- */

window.addEventListener("load", async () => {
  let saved = localStorage.getItem("rdTracker_lastSession")
  if (!saved) return

  try {
    let s = JSON.parse(saved)
    if (!s.user || !s.coupleCode) return

    // Pre-fill form in case they want to change anything
    document.getElementById("myName").value = s.user === "A" ? s.nameA : s.nameB
    document.getElementById("coupleCode").value = s.coupleCode

    // Auto re-login — skip setup card
    user = s.user
    couple = s.coupleCode
    document.getElementById("nameA").value = s.nameA || "Person A"
    document.getElementById("nameB").value = s.nameB || "Person B"

    // Freshen names from Firestore in background
    if (window.db) {
      let snap = await window.getDoc(window.doc(window.db, "couples", couple))
      if (snap.exists()) {
        let d = snap.data()
        document.getElementById("nameA").value = d.nameA || s.nameA
        document.getElementById("nameB").value = d.nameB || s.nameB
        scoreA = d.scoreA || 0
        scoreB = d.scoreB || 0
        activities = d.activities || {}
      }
    }

    document.getElementById("setupCard").style.display = "none"
    document.getElementById("mainApp").style.display = "block"

    let now = new Date()
    calendarYear = now.getFullYear()
    calendarMonth = now.getMonth()

    updateScoreDisplay()
    loadCalendar()
    listenFirebase()

  } catch(e) {
    // Session corrupt — show setup fresh
    localStorage.removeItem("rdTracker_lastSession")
  }
})

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {})
  })
}
function switchAccount() {
  localStorage.removeItem("rdTracker_lastSession")
  location.reload()
}
</script>
